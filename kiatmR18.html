<main class="atm-page">

<h1>

🏧 ATM BANCO SOL R18 KILAMBA

<span class="status money">

🟢 Estado disponível

</span>

</small>

</div>

<section class="form-card">

<h2>

</h2>

id="name"

type="text"

maxlength="30"

autocomplete="name"

placeholder="O seu nome">

<div class="status-options">

<label>

<input

type="radio"

name="status"

value="Tem dinheiro">

🟢 Tem dinheiro

</label>

<label>

<input

type="radio"

name="status"

value="Não tem dinheiro">

🔴 Sem dinheiro

</label>

<label>

<input

type="radio"

name="status"

value="Fila longa">

👥 Fila longa

</label>

<label>

<input

type="radio"

name="status"

value="Fora de serviço">

⚠️ Fora de serviço

</label>

</div>

<textarea

id="comment"

maxlength="250"

placeholder="Observação (opcional)">

</textarea>

<button id="sendComment">
    Publicar Informação
</button>

</section>

<section class="comments-card">

<h2>

Informações Recentes

</h2>

<div id="comments">

</div>
